name: Main

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ZLEditor-windows.exe
            binary_path: dist/ZLEditor.exe
          - os: ubuntu-latest
            artifact_name: ZLEditor-linux
            binary_path: dist/ZLEditor
          - os: macos-latest
            artifact_name: ZLEditor-macos
            binary_path: dist/ZLEditor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build editor bundle
        run: npm run build

      - name: Install Python build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build executable
        run: pyinstaller ZLEditor.spec --clean --noconfirm

      - name: Rename packaged binary
        shell: bash
        run: mv "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_name }}"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
