<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZLEditor</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout/editor.css">
</head>
<body>

<div class="app-wrapper">

  <!-- ── Toolbar ── -->
  <header class="toolbar">
    <div class="toolbar__left">
      <button class="btn btn--sm" id="btn-import" data-i18n="btn.import">Importar .zip</button>
      <input type="file" id="input-import" accept=".zip" hidden>
      <button class="btn btn--sm btn--ghost" id="btn-new-file" data-i18n="btn.newFile">+ Arquivo</button>
      <div class="toolbar__divider"></div>
    </div>

    <div class="toolbar__center">
      <span class="toolbar__project-name" id="project-name">Sem projeto</span>
    </div>

    <div class="toolbar__right">
      <span id="compile-status" class="toolbar__status"></span>
      <button class="btn btn--sm btn--ghost" id="btn-log" data-i18n="btn.log">Ver log</button>
      <select id="engine-select" class="engine-select" data-i18n-title="engine.title" title="Motor LaTeX">
        <option value="pdflatex">pdflatex</option>
        <option value="xelatex">xelatex</option>
        <option value="lualatex">lualatex</option>
      </select>
      <button class="btn btn--sm btn--ghost" id="btn-auto-compile"
              data-i18n="btn.autoCompile"
              data-i18n-title="btn.autoCompile.title"
              title="Auto-compilar ao editar">Auto</button>
      <select id="locale-select" class="engine-select" title="Language">
        <option value="pt-BR">PT</option>
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
      <button class="btn btn--sm btn--primary" id="btn-compile" data-i18n="btn.compile">▶ Compilar</button>
      <div class="toolbar__divider"></div>
      <button class="btn btn--sm" id="btn-save" data-i18n="btn.save">Salvar .zip</button>
    </div>
  </header>

  <!-- ── 3-column workspace ── -->
  <div class="workspace">

    <!-- Left: File tree + Zotero panel -->
    <aside class="left-col">
      <div class="file-tree">
        <div class="file-tree__header">
          <span class="file-tree__title" data-i18n="files.title">Arquivos</span>
        </div>
        <div class="file-tree__list" id="file-tree-list"></div>
      </div>

      <!-- Retractable Zotero panel -->
      <div class="zotero-panel" id="zotero-panel">
        <button class="zotero-panel__toggle" id="zotero-toggle">
          <span>Zotero</span>
          <span class="zotero-panel__toggle-icon" id="zotero-toggle-icon">▲</span>
        </button>
        <div class="zotero-panel__body">
          <div class="zotero-panel__status">
            <span class="status-dot status-dot--pending" id="status-dot"></span>
            <span class="zotero-panel__status-text" id="status-text" data-i18n="zotero.status.disconnected">Não conectado</span>
            <button class="btn btn--sm btn--ghost" id="connect-btn" data-i18n="btn.connect">Conectar</button>
          </div>
          <div class="zotero-panel__search">
            <input class="input" type="text" id="search-input"
                   data-i18n-placeholder="search.placeholder"
                   placeholder="Buscar referências…" autocomplete="off">
          </div>
          <div class="zotero-panel__list" id="ref-list"></div>
        </div>
      </div>
    </aside>

    <!-- Center: CodeMirror editor -->
    <div class="editor-col">
      <div class="editor-header">
        <span id="active-filename">—</span>
      </div>
      <div class="editor-container" id="editor-container"></div>
    </div>

    <!-- Right: PDF viewer -->
    <div class="pdf-col">
      <div class="pdf-header">
        <span id="compile-timestamp"></span>
      </div>
      <div class="pdf-container" id="pdf-container">
        <div class="empty-state" data-i18n-html="pdf.empty">Clique em <strong>▶ Compilar</strong> para ver o PDF</div>
      </div>
    </div>

  </div><!-- .workspace -->
</div><!-- .app-wrapper -->

<!-- ── Log modal ── -->
<dialog id="log-modal">
  <div class="modal__header">
    <span class="modal__title" data-i18n="log.modal.title">Log de compilação</span>
  </div>
  <div class="modal__body">
    <pre class="log-output" id="log-output"></pre>
  </div>
  <div class="modal__footer">
    <button class="btn" id="btn-copy-log" data-i18n="btn.copyLog">Copiar log</button>
    <button class="btn btn--primary" id="btn-close-log" data-i18n="btn.closeLog">Fechar</button>
  </div>
</dialog>

<!-- ── Restore session modal ── -->
<dialog id="restore-modal">
  <div class="modal__header">
    <span class="modal__title" data-i18n="restore.modal.title">Restaurar sessão</span>
  </div>
  <div class="modal__body">
    <p class="restore-info">
      <span data-i18n="restore.body.prefix">Existe uma sessão salva automaticamente em</span>
      <strong id="restore-date"></strong>.<br>
      <span data-i18n="restore.body.suffix">Deseja restaurá-la?</span>
    </p>
  </div>
  <div class="modal__footer">
    <button class="btn" id="btn-discard" data-i18n="btn.discard">Descartar</button>
    <button class="btn btn--primary" id="btn-restore" data-i18n="btn.restore">Restaurar</button>
  </div>
</dialog>

<div class="toast" id="toast"></div>

<div id="quick-open-overlay" class="qo-overlay">
  <div class="qo-container">
    <input id="quick-open-input" class="qo-input" type="text"
           data-i18n-placeholder="quickopen.placeholder"
           placeholder="Buscar arquivo… ou % para buscar conteúdo" autocomplete="off" spellcheck="false">
    <div id="quick-open-list" class="qo-list"></div>
  </div>
</div>

<script type="module" src="scripts/app.js"></script>
</body>
</html>
